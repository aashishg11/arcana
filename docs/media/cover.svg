<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="On-Device AI Is Easy to Demo. Hard to Trust. — Arcana">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151235"/>
      <stop offset="0.55" stop-color="#0d0a20"/>
      <stop offset="1" stop-color="#070510"/>
    </linearGradient>
    <radialGradient id="glowIris" cx="0.15" cy="0.02" r="0.62">
      <stop offset="0" stop-color="#7c6cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c6cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="0.94" cy="1.02" r="0.55">
      <stop offset="0" stop-color="#f5c451" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#f5c451" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c6cf6"/>
      <stop offset="1" stop-color="#f5c451"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c6cf6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#8f7ff8" stop-opacity="0.95"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.4" fill="#ffffff" opacity="0.045"/>
    </pattern>
  </defs>

  <!-- background wash -->
  <rect width="1200" height="500" fill="url(#bg)"/>
  <rect width="1200" height="500" fill="url(#dots)"/>
  <rect width="1200" height="500" fill="url(#glowIris)"/>
  <rect width="1200" height="500" fill="url(#glowGold)"/>

  <!-- value/latency sparkline motif -->
  <path d="M600,455 675,435 730,445 795,380 855,402 915,320 980,352 1045,268 1105,300 1165,225 1165,480 600,480 Z" fill="#7c6cf6" opacity="0.06"/>
  <polyline fill="none" stroke="url(#spark)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
    points="600,455 675,435 730,445 795,380 855,402 915,320 980,352 1045,268 1105,300 1165,225"/>
  <circle cx="1165" cy="225" r="5" fill="#f5c451"/>

  <!-- on-device chip glyph -->
  <g transform="translate(1052,52)" opacity="0.92">
    <rect x="0" y="0" width="92" height="92" rx="20" fill="#171338" stroke="#7c6cf6" stroke-opacity="0.5"/>
    <rect x="26" y="26" width="40" height="40" rx="9" fill="url(#accent)" opacity="0.9"/>
    <g stroke="#8f7ff8" stroke-width="3" stroke-linecap="round" opacity="0.65">
      <line x1="22" y1="-8" x2="22" y2="0"/><line x1="46" y1="-8" x2="46" y2="0"/><line x1="70" y1="-8" x2="70" y2="0"/>
      <line x1="22" y1="92" x2="22" y2="100"/><line x1="46" y1="92" x2="46" y2="100"/><line x1="70" y1="92" x2="70" y2="100"/>
      <line x1="-8" y1="22" x2="0" y2="22"/><line x1="-8" y1="46" x2="0" y2="46"/><line x1="-8" y1="70" x2="0" y2="70"/>
      <line x1="92" y1="22" x2="100" y2="22"/><line x1="92" y1="46" x2="100" y2="46"/><line x1="92" y1="70" x2="100" y2="70"/>
    </g>
  </g>

  <!-- eyebrow -->
  <text x="90" y="132" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="20" letter-spacing="4" fill="#a99cf7" font-weight="600">ARCANA · ON-DEVICE AI</text>

  <!-- title -->
  <text x="87" y="212" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="56" fill="#f4f2ff" font-weight="800">On-Device AI Is Easy to Demo.</text>
  <text x="87" y="282" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="56" fill="#f4f2ff" font-weight="800">Hard to <tspan fill="#f5c451">Trust</tspan>.</text>

  <!-- accent underline -->
  <rect x="91" y="312" width="120" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- subtitle -->
  <text x="90" y="360" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" fill="#b9b2e0">What it took to ship — and measure — a privacy-first AI app on a Pixel.</text>

  <!-- on-device badge pill -->
  <g transform="translate(90,392)">
    <rect x="0" y="0" width="146" height="34" rx="17" fill="#7c6cf6" opacity="0.16"/>
    <circle cx="20" cy="17" r="5" fill="#8f7ff8"/>
    <text x="34" y="23" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" fill="#cfc7fb" font-weight="600">On-device</text>
  </g>
</svg>
