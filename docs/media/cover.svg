<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="On-Device AI Is Easy to Demo. Hard to Trust. — Arcana">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151235"/>
      <stop offset="0.55" stop-color="#0d0a20"/>
      <stop offset="1" stop-color="#070510"/>
    </linearGradient>
    <radialGradient id="glowIris" cx="0.15" cy="0.02" r="0.62">
      <stop offset="0" stop-color="#7c6cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c6cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="0.94" cy="1.02" r="0.55">
      <stop offset="0" stop-color="#f5c451" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#f5c451" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c6cf6"/>
      <stop offset="1" stop-color="#f5c451"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c6cf6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#8f7ff8" stop-opacity="0.95"/>
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.4" fill="#ffffff" opacity="0.045"/>
    </pattern>
  </defs>

  <!-- background wash -->
  <rect width="1200" height="620" fill="url(#bg)"/>
  <rect width="1200" height="620" fill="url(#dots)"/>
  <rect width="1200" height="620" fill="url(#glowIris)"/>
  <rect width="1200" height="620" fill="url(#glowGold)"/>

  <!-- value/latency sparkline motif -->
  <path d="M600,575 680,550 738,562 805,486 868,512 930,418 998,454 1064,356 1108,392 1168,300 1168,600 600,600 Z" fill="#7c6cf6" opacity="0.06"/>
  <polyline fill="none" stroke="url(#spark)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"
    points="600,575 680,550 738,562 805,486 868,512 930,418 998,454 1064,356 1108,392 1168,300"/>
  <circle cx="1168" cy="300" r="6" fill="#f5c451"/>

  <!-- on-device chip glyph -->
  <g transform="translate(1048,66)" opacity="0.92">
    <rect x="0" y="0" width="104" height="104" rx="22" fill="#171338" stroke="#7c6cf6" stroke-opacity="0.5"/>
    <rect x="30" y="30" width="44" height="44" rx="10" fill="url(#accent)" opacity="0.9"/>
    <g stroke="#8f7ff8" stroke-width="3.5" stroke-linecap="round" opacity="0.65">
      <line x1="26" y1="-9" x2="26" y2="0"/><line x1="52" y1="-9" x2="52" y2="0"/><line x1="78" y1="-9" x2="78" y2="0"/>
      <line x1="26" y1="104" x2="26" y2="113"/><line x1="52" y1="104" x2="52" y2="113"/><line x1="78" y1="104" x2="78" y2="113"/>
      <line x1="-9" y1="26" x2="0" y2="26"/><line x1="-9" y1="52" x2="0" y2="52"/><line x1="-9" y1="78" x2="0" y2="78"/>
      <line x1="104" y1="26" x2="113" y2="26"/><line x1="104" y1="52" x2="113" y2="52"/><line x1="104" y1="78" x2="113" y2="78"/>
    </g>
  </g>

  <!-- eyebrow -->
  <text x="90" y="170" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" letter-spacing="4.5" fill="#a99cf7" font-weight="600">ARCANA · ON-DEVICE AI</text>

  <!-- title -->
  <text x="86" y="272" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="62" fill="#f4f2ff" font-weight="800">On-Device AI Is Easy to Demo.</text>
  <text x="86" y="352" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="62" fill="#f4f2ff" font-weight="800">Hard to <tspan fill="#f5c451">Trust</tspan>.</text>

  <!-- accent underline -->
  <rect x="90" y="388" width="132" height="6" rx="3" fill="url(#accent)"/>

  <!-- subtitle -->
  <text x="90" y="448" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="25" fill="#b9b2e0">What it took to ship — and measure — a privacy-first AI app on a Pixel.</text>

  <!-- on-device badge pill -->
  <g transform="translate(90,486)">
    <rect x="0" y="0" width="158" height="38" rx="19" fill="#7c6cf6" opacity="0.16"/>
    <circle cx="23" cy="19" r="5.5" fill="#8f7ff8"/>
    <text x="39" y="25" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" fill="#cfc7fb" font-weight="600">On-device</text>
  </g>
</svg>
